name: Build and Deploy Transport Website

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/transport-website:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/transport-website:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 15.135.140.12
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            whoami
            hostname
            docker ps
            docker pull ${{ secrets.DOCKER_USERNAME }}/transport-website:latest

            docker stop transport-container || true
            docker rm transport-container || true

            docker run -d \
              --name transport-container \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/transport-website:latest
